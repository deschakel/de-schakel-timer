<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍎 Timer — De Schakel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --orange: #FF8E53; --red: #FF6B6B; --green: #00B894; --teal: #00CEC9;
    --yellow: #FDCB6E; --dark: #3D2C1E; --mid: #8B6F5E;
    --bg: #FFF9F0; --card: #FFFFFF; --border: #F0DCC8;
  }
  html, body { height: 100%; font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--dark); }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; position: relative; overflow: hidden; }

  .deco { position: fixed; font-size: 40px; opacity: 0.12; pointer-events: none; animation: float 6s ease-in-out infinite; }
  .deco:nth-child(1) { top: 5%; left: 5%; animation-delay: 0s; font-size: 50px; }
  .deco:nth-child(2) { top: 10%; right: 8%; animation-delay: 1s; font-size: 35px; }
  .deco:nth-child(3) { bottom: 12%; left: 8%; animation-delay: 2s; font-size: 45px; }
  .deco:nth-child(4) { bottom: 8%; right: 6%; animation-delay: 0.5s; font-size: 38px; }
  .deco:nth-child(5) { top: 50%; left: 2%; animation-delay: 1.5s; font-size: 30px; }
  .deco:nth-child(6) { top: 50%; right: 2%; animation-delay: 2.5s; font-size: 42px; }
  @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15px) rotate(5deg); } }

  .card { background: var(--card); border-radius: 32px; padding: 36px 44px 32px; max-width: 500px; width: 100%; box-shadow: 0 20px 60px rgba(255,142,83,0.2), 0 4px 20px rgba(0,0,0,0.08); position: relative; z-index: 1; }
  .card-header { text-align: center; margin-bottom: 24px; }
  .card-header h1 { font-size: 26px; font-weight: 900; color: var(--dark); letter-spacing: -0.5px; }
  .card-header p { font-size: 13px; color: var(--mid); font-weight: 700; margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }

  /* Pop-out button */
  .popout-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 11px; margin-bottom: 20px;
    border-radius: 14px; border: 2px dashed #FFAA60;
    background: #FFF5EE; color: #D06020;
    font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px;
    cursor: pointer; transition: all 0.15s;
  }
  .popout-btn:hover { background: #FFE8D0; border-color: #FF8E53; }
  .popout-icon { font-size: 16px; }

  .clock-wrap { display: flex; justify-content: center; margin-bottom: 22px; }
  .clock-face { position: relative; width: 210px; height: 210px; }
  .clock-face svg { width: 210px; height: 210px; transform: rotate(-90deg); filter: drop-shadow(0 6px 16px rgba(255,142,83,0.25)); }
  .clock-bg-ring { fill: none; stroke: #F5EBE0; stroke-width: 14; }
  .clock-progress-ring { fill: none; stroke-width: 14; stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.5s ease; }
  .clock-inner-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
  .time-big { font-size: 54px; font-weight: 900; color: var(--dark); line-height: 1; letter-spacing: -2px; transition: color 0.4s; }
  .time-big.warning { color: #D68000; }
  .time-big.danger { color: #D63031; animation: pulse 0.5s ease infinite alternate; }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.04); } }
  .time-label { font-size: 12px; font-weight: 700; color: var(--mid); text-transform: uppercase; letter-spacing: 2px; margin-top: 2px; }
  .clock-emoji { position: absolute; bottom: 8px; right: 8px; font-size: 28px; transition: transform 0.3s; }
  .clock-emoji.running { animation: wiggle 0.5s ease infinite alternate; }
  @keyframes wiggle { from { transform: rotate(-8deg); } to { transform: rotate(8deg); } }

  .presets-label { font-size: 12px; font-weight: 700; color: var(--mid); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; text-align: center; }
  .presets-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
  .preset-btn { padding: 10px 6px; border-radius: 14px; border: 2px solid var(--border); background: var(--bg); font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px; color: var(--mid); cursor: pointer; transition: all 0.15s; }
  .preset-btn:hover:not(.active) { border-color: var(--orange); color: var(--orange); background: #FFF5EE; }
  .preset-btn.active { background: linear-gradient(135deg, var(--red), var(--orange)); border-color: transparent; color: white; box-shadow: 0 3px 10px rgba(255,107,107,0.3); }

  .custom-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 22px; }
  .custom-row label { font-size: 13px; font-weight: 700; color: var(--mid); }
  .custom-row input { width: 70px; padding: 8px 10px; border-radius: 12px; border: 2px solid var(--border); font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 700; text-align: center; color: var(--dark); background: var(--bg); outline: none; transition: border-color 0.15s; }
  .custom-row input:focus { border-color: var(--orange); }

  .btn-row { display: flex; gap: 12px; margin-bottom: 16px; }
  .btn-start { flex: 2; padding: 15px; border-radius: 18px; border: none; background: linear-gradient(135deg, var(--green), var(--teal)); color: white; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 17px; cursor: pointer; box-shadow: 0 6px 20px rgba(0,184,148,0.4); transition: all 0.15s; }
  .btn-start:hover { transform: translateY(-2px); }
  .btn-start.paused { background: linear-gradient(135deg, var(--yellow), #E17055); box-shadow: 0 6px 20px rgba(225,112,85,0.4); }
  .btn-reset { flex: 1; padding: 15px; border-radius: 18px; border: 2px solid var(--border); background: white; color: var(--mid); font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; transition: all 0.15s; }
  .btn-reset:hover { background: var(--bg); border-color: var(--orange); color: var(--orange); }
  .status-bar { text-align: center; font-size: 14px; font-weight: 700; color: var(--mid); min-height: 22px; }

  .done-overlay { display: none; position: fixed; inset: 0; background: linear-gradient(135deg, #FF6B6B, #FF8E53); flex-direction: column; align-items: center; justify-content: center; z-index: 200; animation: fadeIn 0.4s ease; }
  .done-overlay.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  .done-big-emoji { font-size: 100px; animation: pop 0.5s cubic-bezier(0.175,0.885,0.32,1.275) forwards; margin-bottom: 16px; }
  @keyframes pop { from { transform: scale(0) rotate(-30deg); } to { transform: scale(1) rotate(0); } }
  .done-confetti { display: flex; gap: 16px; font-size: 36px; margin-bottom: 20px; }
  .done-title { color: white; font-size: 48px; font-weight: 900; text-shadow: 0 3px 12px rgba(0,0,0,0.2); margin-bottom: 8px; }
  .done-msg { color: rgba(255,255,255,0.9); font-size: 20px; font-weight: 700; margin-bottom: 40px; }
  .done-again { padding: 16px 48px; border-radius: 20px; border: none; background: white; color: #FF6B6B; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 20px; cursor: pointer; transition: transform 0.15s; }
  .done-again:hover { transform: scale(1.05); }

  /* Mini popup window styles (injected into pop-out window) */
  #miniStyles { display: none; }
</style>
</head>
<body>

<div class="deco">🍎</div>
<div class="deco">✏️</div>
<div class="deco">📚</div>
<div class="deco">🎨</div>
<div class="deco">⭐</div>
<div class="deco">🌈</div>

<div class="card">
  <div class="card-header">
    <h1>🍎 Basisschool De Schakel</h1>
    <p>Leertijd begint nu!</p>
  </div>

  <button class="popout-btn" id="popoutBtn">
    <span class="popout-icon">🪟</span>
    Pop-out als zwevend venster — altijd zichtbaar op alle tabbladen
  </button>

  <div class="clock-wrap">
    <div class="clock-face">
      <svg viewBox="0 0 210 210">
        <circle class="clock-bg-ring" cx="105" cy="105" r="91"/>
        <circle class="clock-progress-ring" id="progressRing" cx="105" cy="105" r="91"
          stroke="#FF8E53" stroke-dasharray="571.8" stroke-dashoffset="0"/>
      </svg>
      <div class="clock-inner-text">
        <div class="time-big" id="display">15:00</div>
        <div class="time-label" id="timeLabel">minuten over</div>
      </div>
      <div class="clock-emoji" id="clockEmoji">🕐</div>
    </div>
  </div>

  <p class="presets-label">Kies een tijdsduur</p>
  <div class="presets-grid" id="presetGrid">
    <button class="preset-btn" onclick="setPreset(5)">5 min</button>
    <button class="preset-btn active" onclick="setPreset(15)">15 min</button>
    <button class="preset-btn" onclick="setPreset(20)">20 min</button>
    <button class="preset-btn" onclick="setPreset(30)">30 min</button>
  </div>

  <div class="custom-row">
    <label>Eigen tijd:</label>
    <input type="number" id="customInput" min="1" max="99" placeholder="min" onchange="setCustom()">
    <label>minuten</label>
  </div>

  <div class="btn-row">
    <button class="btn-start" id="startBtn" onclick="toggleTimer()">▶ Starten</button>
    <button class="btn-reset" onclick="resetTimer()">↺ Opnieuw</button>
  </div>

  <div class="status-bar" id="statusBar">Klaar om te starten! 🌟</div>
</div>

<div class="done-overlay" id="doneOverlay">
  <div class="done-big-emoji">🎉</div>
  <div class="done-confetti">⭐ 🌟 ✨ 🌟 ⭐</div>
  <div class="done-title">Tijd is om!</div>
  <div class="done-msg">Goed gedaan, iedereen! 🎊</div>
  <button class="done-again" onclick="dismissDone()">Opnieuw beginnen</button>
</div>

<script>
const CIRCUMFERENCE = 571.8;
let totalSec = 15 * 60;
let remaining = totalSec;
let running = false;
let ticker = null;
let audioCtx = null;
let miniWin = null;

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playAlarm(ctx) {
  if (!ctx) { try { ctx = getCtx(); } catch(e) { return; } }
  const melody = [523,659,784,1047,880,1047,880,784,1047,1319];
  let t = ctx.currentTime;
  melody.forEach((freq, i) => {
    try {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = i % 2 === 0 ? 'sine' : 'triangle';
      g.gain.setValueAtTime(0, t + i*0.22);
      g.gain.linearRampToValueAtTime(0.5, t + i*0.22 + 0.06);
      g.gain.linearRampToValueAtTime(0, t + i*0.22 + 0.2);
      osc.start(t + i*0.22); osc.stop(t + i*0.22 + 0.25);
    } catch(e) {}
  });
}

function playTick() {
  try {
    const ctx = getCtx(), osc = ctx.createOscillator(), g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.frequency.value = 1400; osc.type = 'sine';
    g.gain.setValueAtTime(0.18, ctx.currentTime);
    g.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.06);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.08);
  } catch(e) {}
}

function fmt(s) {
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

function render() {
  const pct = totalSec > 0 ? remaining / totalSec : 0;
  document.getElementById('progressRing').style.strokeDashoffset = CIRCUMFERENCE * (1 - pct);
  const d = document.getElementById('display');
  d.textContent = fmt(remaining);
  d.className = 'time-big';
  const minLeft = Math.floor(remaining / 60);
  document.getElementById('timeLabel').textContent = remaining < 60 ? 'seconden over' : minLeft === 1 ? '1 minuut over' : minLeft + ' minuten over';
  if (remaining <= 60) { d.classList.add('danger'); document.getElementById('progressRing').style.stroke = '#D63031'; }
  else if (remaining <= totalSec * 0.25) { d.classList.add('warning'); document.getElementById('progressRing').style.stroke = '#D68000'; }
  else { document.getElementById('progressRing').style.stroke = '#FF8E53'; }
  const clocks = ['🕛','🕐','🕑','🕒','🕓','🕔','🕕','🕖','🕗','🕘','🕙','🕚'];
  document.getElementById('clockEmoji').textContent = clocks[Math.round((1-pct)*11)];
  updateMini();
}

function setPreset(min) {
  if (running) return;
  totalSec = min * 60; remaining = totalSec;
  document.getElementById('customInput').value = '';
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('active', b.textContent.trim() === min + ' min'));
  render();
  document.getElementById('statusBar').textContent = 'Klaar om te starten! 🌟';
}

function setCustom() {
  if (running) return;
  const v = parseInt(document.getElementById('customInput').value);
  if (!v || v < 1) return;
  totalSec = v * 60; remaining = totalSec;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  render();
}

function toggleTimer() {
  getCtx();
  if (running) {
    clearInterval(ticker); running = false;
    document.getElementById('startBtn').textContent = '▶ Hervatten';
    document.getElementById('startBtn').className = 'btn-start paused';
    document.getElementById('statusBar').textContent = 'Gepauzeerd ⏸';
    document.getElementById('clockEmoji').classList.remove('running');
    return;
  }
  if (remaining <= 0) return;
  running = true;
  document.getElementById('startBtn').textContent = '⏸ Pauzeren';
  document.getElementById('startBtn').className = 'btn-start';
  document.getElementById('statusBar').textContent = 'Timer loopt! 🚀';
  document.getElementById('clockEmoji').classList.add('running');
  ticker = setInterval(() => {
    remaining--;
    if (remaining <= 10 && remaining > 0) playTick();
    render();
    if (remaining <= 0) {
      clearInterval(ticker); running = false;
      document.getElementById('startBtn').textContent = '▶ Starten';
      document.getElementById('startBtn').className = 'btn-start';
      document.getElementById('clockEmoji').classList.remove('running');
      document.getElementById('doneOverlay').classList.add('show');
      playAlarm();
      if (miniWin && !miniWin.closed) {
        try { miniWin.document.getElementById('miniDone').style.display = 'flex'; } catch(e) {}
        try { playAlarm(miniWin.audioCtx); } catch(e) {}
      }
    }
  }, 1000);
}

function resetTimer() {
  clearInterval(ticker); running = false; remaining = totalSec;
  document.getElementById('startBtn').textContent = '▶ Starten';
  document.getElementById('startBtn').className = 'btn-start';
  document.getElementById('statusBar').textContent = 'Klaar om te starten! 🌟';
  document.getElementById('clockEmoji').classList.remove('running');
  render();
}

function dismissDone() {
  document.getElementById('doneOverlay').classList.remove('show');
  resetTimer();
}

// ── Mini floating window ──────────────────────────────────────────
function updateMini() {
  if (!miniWin || miniWin.closed) return;
  try {
    const pct = totalSec > 0 ? remaining / totalSec : 0;
    const MCIRC = 2 * Math.PI * 44;
    miniWin.document.getElementById('mTime').textContent = fmt(remaining);
    miniWin.document.getElementById('mRing').style.strokeDashoffset = MCIRC * (1 - pct);
    const t = miniWin.document.getElementById('mTime');
    t.style.color = remaining <= 60 ? '#D63031' : remaining <= totalSec * 0.25 ? '#D68000' : '#3D2C1E';
    miniWin.document.getElementById('mRing').style.stroke = remaining <= 60 ? '#D63031' : remaining <= totalSec * 0.25 ? '#D68000' : '#FF8E53';
  } catch(e) {}
}

document.getElementById('popoutBtn').addEventListener('click', function() {
  if (miniWin && !miniWin.closed) { miniWin.focus(); return; }
  const W = 220, H = 260;
  const left = screen.width - W - 20, top = 20;
  miniWin = window.open('', 'ClassroomTimerMini',
    `width=${W},height=${H},left=${left},top=${top},resizable=yes,scrollbars=no,toolbar=no,menubar=no,location=no,status=no`);
  if (!miniWin) { alert('Sta pop-ups toe voor deze pagina en probeer opnieuw.'); return; }

  const MCIRC = 2 * Math.PI * 44;
  miniWin.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Nunito',sans-serif; background:#FFF9F0; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; user-select:none; }
  .top { background:#FF6B6B; width:100%; text-align:center; padding:8px 6px 6px; }
  .top h2 { color:white; font-size:13px; font-weight:900; }
  .top p { color:rgba(255,255,255,0.85); font-size:10px; font-weight:700; letter-spacing:1px; }
  .ring-wrap { position:relative; width:110px; height:110px; margin:12px auto 8px; }
  .ring-wrap svg { width:110px; height:110px; transform:rotate(-90deg); }
  .ring-bg { fill:none; stroke:#F5EBE0; stroke-width:10; }
  .ring-fg { fill:none; stroke:#FF8E53; stroke-width:10; stroke-linecap:round; transition:stroke-dashoffset 1s linear, stroke 0.4s; stroke-dasharray:${MCIRC.toFixed(1)}; stroke-dashoffset:0; }
  .ring-text { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; }
  .mtime { font-size:26px; font-weight:900; color:#3D2C1E; letter-spacing:-1px; line-height:1; }
  .hint { font-size:10px; color:#8B6F5E; font-weight:700; text-transform:uppercase; letter-spacing:1px; text-align:center; margin-bottom:8px; }
  .done-mini { display:none; position:fixed; inset:0; background:#FF6B6B; flex-direction:column; align-items:center; justify-content:center; z-index:10; }
  .done-mini.show { display:flex; }
  .done-mini .emoji { font-size:48px; margin-bottom:8px; animation:pop 0.5s ease forwards; }
  @keyframes pop { from{transform:scale(0) rotate(-30deg)} to{transform:scale(1) rotate(0)} }
  .done-mini .txt { color:white; font-size:22px; font-weight:900; margin-bottom:4px; }
  .done-mini .sub { color:rgba(255,255,255,0.9); font-size:13px; font-weight:700; margin-bottom:16px; }
  .done-mini button { padding:8px 24px; border-radius:12px; border:none; background:white; color:#FF6B6B; font-family:'Nunito',sans-serif; font-weight:900; font-size:14px; cursor:pointer; }
</style></head><body>
<div class="top"><h2>🍎 De Schakel</h2><p>Gebruik hoofdvenster om te bedienen</p></div>
<div class="ring-wrap">
  <svg viewBox="0 0 110 110">
    <circle class="ring-bg" cx="55" cy="55" r="44"/>
    <circle class="ring-fg" id="mRing" cx="55" cy="55" r="44"/>
  </svg>
  <div class="ring-text">
    <div class="mtime" id="mTime">${fmt(remaining)}</div>
  </div>
</div>
<div class="hint">Wissel vrij van tabblad ✓</div>
<div class="done-mini" id="miniDone">
  <div class="emoji">🎉</div>
  <div class="txt">Tijd is om!</div>
  <div class="sub">Goed gedaan! 🌟</div>
  <button onclick="this.closest('.done-mini').style.display='none'">OK</button>
</div>
</body></html>`);
  miniWin.document.close();
  miniWin.audioCtx = null;
  document.getElementById('popoutBtn').textContent = '🪟  Zwevend venster is open — klik om naar voren te brengen';
  updateMini();
});

render();
</script>
</body>
</html>
